<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eco-City RL Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <h2>Eco-City RL</h2>
    <div id="rollout-picker" style="margin-bottom:8px;">
      <label for="rollout-select" style="margin-right:6px;">Rollout:</label>
      <select id="rollout-select"></select>
    </div>
    <div id="stats"></div>
    <div id="controls">
      <button id="play" type="button">Play</button>
      <button id="pause" type="button">Pause</button>
      <input type="range" id="step-slider" min="0" value="0" />
      <span id="step-label">Step: 0</span>
    </div>
  </div>
  <div id="legend-panel">
    <div class="lg-title">Zones</div>
    <div id="legend"></div>
  </div>
  <canvas id="canvas"></canvas>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
                   "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/" } }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
